<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CaseCraft AI - Verdict Report</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f7, #e6edf5);
            margin: 0;
            padding: 0;
        }

        /* Main Card */
        .container {
            width: 65%;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-top: 5px solid #0f2a4d;
        }

        /* Header Bar */
        .header {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #0f2a4d, #1f4e79);
            color: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Title */
        h1 {
            text-align: center;
            color: #0f2a4d;
            margin-bottom: 30px;
        }

        /* Section headings */
        h3 {
            color: #1f2d3d;
            margin-top: 22px;
            border-left: 5px solid #0f2a4d;
            padding-left: 10px;
            font-weight: 600;
        }

        /* Content blocks */
        p {
            background: #f7f9fc;
            padding: 14px;
            border-radius: 10px;
            line-height: 1.6;
            color: #2c3e50;
            border-left: 4px solid #d0d8e6;
        }

        /* Verdict Highlight */
        .verdict {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #8b0000;
            background: #fff1f1;
            padding: 16px;
            border-radius: 12px;
            margin-top: 12px;
            border-left: 6px solid #8b0000;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.05);
        }

        /* Buttons */
        .actions {
            text-align: center;
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #0f2a4d;
            color: white;
            padding: 11px 20px;
            border-radius: 10px;
            margin: 5px;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn:hover {
            background: #1f4e79;
            transform: scale(1.05);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #8a99a8;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="header">
        ⚖️ CaseCraft AI — Court Verdict Report
    </div>

    <h1>Case Analysis Result</h1>

    <h3>📌 Case Details</h3>
    <p>{{ case }}</p>

    <h3>⚖️ Prosecution Argument</h3>
    <p>{{ prosecution }}</p>

    <h3>🛡️ Defense Argument</h3>
    <p>{{ defense }}</p>

    <h3>🏛️ Final AI Verdict</h3>
    <p class="verdict">{{ verdict }}</p>

    <div class="actions">
        <a class="btn" href="/">← Back</a>
        <a class="btn" onclick="window.print()">🖨 Print</a>
    </div>

    <div class="footer">
        Generated by CaseCraft AI • Flask + AI Simulation
    </div>

</div>

</body>
</html>
